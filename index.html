<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>World Cup 2026 Predictions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"></script>
  <style>
    :root {
      --bg: #070d1a;
      --bg-card: #0f1a2e;
      --surface: #152238;
      --border: #243552;
      --text: #f0f4fc;
      --muted: #8fa3c4;
      --gold: #f4c430;
      --gold-dim: rgba(244, 196, 48, 0.15);
      --accent: #00e676;
      --accent-dim: rgba(0, 230, 118, 0.12);
      --danger: #ff5252;
      --radius: 14px;
      --nav-h: 64px;
      --safe-b: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 100% 60% at 50% -10%, rgba(244, 196, 48, 0.12), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 80%, rgba(0, 230, 118, 0.06), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .hidden { display: none !important; }

    /* Auth */
    #view-auth {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 1.5rem;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
    }

    .wc-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid rgba(244, 196, 48, 0.35);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .auth-card h1 {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.35rem;
    }

    .auth-card .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }

    .field input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    .btn {
      width: 100%;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #e6a800);
      color: #0a0a0a;
      margin-top: 0.25rem;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      margin-top: 0.75rem;
      font-size: 0.9rem;
    }

    .auth-msg {
      margin-top: 1rem;
      font-size: 0.85rem;
      text-align: center;
      min-height: 1.2em;
    }

    .auth-msg.error { color: var(--danger); }
    .auth-msg.ok { color: var(--accent); }

    .auth-msg.loading { color: var(--gold); }

    #auth-boot-error {
      margin-bottom: 1rem;
      padding: 0.75rem;
      border-radius: 10px;
      background: rgba(255, 82, 82, 0.12);
      border: 1px solid rgba(255, 82, 82, 0.35);
      color: var(--danger);
      font-size: 0.85rem;
      display: none;
    }

    #auth-boot-error.visible { display: block; }

    /* App shell */
    #view-app {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      padding-bottom: calc(var(--nav-h) + var(--safe-b) + 1rem);
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(7, 13, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .top-bar h1 {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .top-bar .user {
      font-size: 0.75rem;
      color: var(--muted);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-signout {
      padding: 0.4rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
    }

    .page {
      padding: 1.25rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
    }

    .page-desc {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .banner {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .banner.error { border-color: rgba(255, 82, 82, 0.4); color: var(--danger); }

    /* Match cards */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      list-style: none;
    }

    .match-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .match-card.locked { opacity: 0.72; }

    .match-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .match-meta {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 500;
    }

    .pill {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
    }

    .pill.open { background: var(--accent-dim); color: var(--accent); }
    .pill.locked { background: rgba(143, 163, 196, 0.15); color: var(--muted); }
    .pill.live { background: rgba(255, 107, 53, 0.15); color: #ff8c5a; }

    .teams-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
      text-align: center;
    }

    .team-name {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.25;
      max-width: 100%;
    }

    .team-side:first-child .team-name {
      flex-direction: row-reverse;
      justify-content: flex-start;
      text-align: right;
    }

    .team-side:last-child .team-name {
      justify-content: flex-start;
      text-align: left;
    }

    .team-flag {
      font-size: 1.35rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .team-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .score-mid {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--gold);
    }

    .prediction-section {
      margin-top: 0.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .prediction-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.65rem;
    }

    .pick-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .pick-btn {
      padding: 0.7rem 0.35rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.2;
    }

    .pick-btn span {
      display: block;
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 0.15rem;
    }

    .pick-btn:hover:not(:disabled) {
      border-color: var(--gold);
      color: var(--gold);
    }

    .pick-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pick-btn.selected {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 16px rgba(244, 196, 48, 0.2);
    }

    .pick-btn.selected span { color: var(--gold); opacity: 0.85; }

    .submit-prediction {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 2px solid rgba(244, 196, 48, 0.5);
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), #e6a800);
      color: #0a0a0a;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(244, 196, 48, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-prediction:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(244, 196, 48, 0.45);
    }

    .submit-prediction:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-prediction:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      border-color: var(--border);
      background: var(--surface);
      color: var(--muted);
    }

    .submit-prediction.ready:not(:disabled) {
      animation: submit-pulse 2s ease-in-out infinite;
    }

    @keyframes submit-pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(244, 196, 48, 0.35); }
      50% { box-shadow: 0 6px 32px rgba(244, 196, 48, 0.55); }
    }

    .prediction-status {
      margin-top: 0.6rem;
      font-size: 0.78rem;
      font-weight: 600;
      text-align: center;
      color: var(--accent);
    }

    .prediction-status.locked-note {
      color: var(--muted);
    }

    /* Leaderboard */
    .lb-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .lb-row.you { border-color: var(--gold); background: var(--gold-dim); }

    .lb-rank {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .lb-row:nth-child(1) .lb-rank { background: linear-gradient(135deg, #ffd700, #f4c430); color: #0a0a0a; }
    .lb-row:nth-child(2) .lb-rank { background: #c0c0c0; color: #0a0a0a; }
    .lb-row:nth-child(3) .lb-rank { background: #cd7f32; color: #fff; }

    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-weight: 700; font-size: 0.95rem; }
    .lb-stats { font-size: 0.75rem; color: var(--muted); }

    .lb-points {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--gold);
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: rgba(15, 26, 46, 0.96);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 20;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
      border: none;
      background: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.15s;
    }

    .nav-item svg { width: 22px; height: 22px; }

    .nav-item.active { color: var(--gold); }

    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + var(--safe-b) + 1rem);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 0.65rem 1.1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 50;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <!-- AUTH -->
  <div id="view-auth">
    <div class="auth-card">
      <div id="auth-boot-error" role="alert"></div>
      <div class="wc-badge">🏆 FIFA World Cup 2026</div>
      <h1 id="auth-title">Sign in</h1>
      <p class="sub" id="auth-sub">Predict every match. Climb the leaderboard.</p>
      <form id="auth-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required placeholder="you@email.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="••••••••" />

  <!-- APP -->
  <div id="view-app" class="hidden">
    <header class="top-bar">
      <div>
        <h1>World Cup 2026</h1>
        <div class="user" id="user-label"></div>
      </div>
      <button type="button" class="btn-signout" id="btn-signout">Sign out</button>
    </header>

    <section id="page-matches" class="page">
      <h2 class="page-title">Matches</h2>
      <p class="page-desc">Pick home win, draw, or away win before kickoff.</p>
      <div id="matches-banner" class="banner hidden"></div>
      <ul id="match-list" class="match-list"></ul>
    </section>

    <section id="page-leaderboard" class="page hidden">
      <h2 class="page-title">Leaderboard</h2>
      <p class="page-desc">1 point per correct result after full time.</p>
      <ul id="lb-list" class="lb-list"></ul>
    </section>

    <nav class="bottom-nav" aria-label="Main">
      <button type="button" class="nav-item active" data-page="matches" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Matches
      </button>
      <button type="button" class="nav-item" data-page="leaderboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21V10M12 21V3M16 21v-6"/></svg>
        Leaderboard
      </button>
    </nav>
  </div>

  <script>

    const SUPABASE_ANON_KEY = "sb_publishable_kT8-hGTFT8swJ5pw2-LVVA_32Kmyfnt";

    const viewAuth = document.getElementById("view-auth");

    let sb = null;

    let currentUser = null;

    let pendingPicks = new Map();

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(() => toastEl.classList.remove("show"), 2600);
    }

    function trim(s) {
      return (s || "").trim();
    }

    function normalizeStatus(s) {
      const x = trim(s).toLowerCase();
      if (x === "live" || x === "in_play") return "live";
      if (x === "finished" || x === "ft") return "finished";
      return "upcoming";
    }

    function isWorldCup(m) {
      return trim(m.competition) === "FIFA World Cup 2026";
    }

    function isLocked(match) {
      const st = normalizeStatus(match.status);
      if (st === "live" || st === "finished") return true;
      if (!match.match_date) return false;
      return new Date(match.match_date) <= new Date();
    }

    function formatKickoff(iso) {
      if (!iso) return "Kickoff TBC";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "Kickoff TBC";
      return d.toLocaleString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function flagFor(teamName) {
      const name = trim(teamName);
      if (TEAM_FLAGS[name]) return TEAM_FLAGS[name];
      if (/^Winner match/i.test(name)) return "🏆";
      return "⚽";
    }

    function shortTeam(name) {
      return trim(name)
        .replace(/\s+FC$/i, "")
        .replace(/\s+AFC$/i, "");
    }

    function teamHtml(teamName) {
      const flag = flagFor(teamName);
      const label = shortTeam(teamName);
      return `<span class="team-name"><span class="team-flag">${flag}</span><span class="team-label">${label}</span></span>`;
    }

    function getOutcome(match) {
      if (match.home_score == null || match.away_score == null) return null;
      if (match.home_score > match.away_score) return "home";
      if (match.home_score < match.away_score) return "away";
      return "draw";
    }

    function pickLabel(pick) {
      return { home: "Home win", draw: "Draw", away: "Away win" }[pick] || pick;
    }

    function showBootError(message) {
      authBootError.textContent = message;
      authBootError.classList.add("visible");
    }

    function initSupabaseClient() {
      const lib = window.supabase;
      if (!lib || typeof lib.createClient !== "function") {
        throw new Error(
          "Supabase JS did not load. Open this page via http://localhost (not as a file:// URL)."
        );
      }
      return lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
        },
      });
    }

    async function ensureProfile(user, displayName) {
      const name =
        trim(displayName) ||
        trim(user.email?.split("@")[0]) ||
        "Player";
      const { error } = await sb.from("profiles").upsert(
        { id: user.id, display_name: name },
        { onConflict: "id" }
      );
      if (error) throw error;
    }

    function setAuthLoading(message) {
      authMsg.textContent = message;
      authMsg.className = "auth-msg loading";
    }

    function setAuthError(message) {
      authMsg.textContent = message;
      authMsg.className = "auth-msg error";
    }

    function setAuthOk(message) {
      authMsg.textContent = message;
      authMsg.className = "auth-msg ok";
    }

    function showApp(user) {
      currentUser = user;
      viewAuth.classList.add("hidden");
      viewApp.classList.remove("hidden");
      document.getElementById("user-label").textContent = user.email || "";
      loadAppData();
    }

    function showAuth() {
      currentUser = null;
      viewApp.classList.add("hidden");
      viewAuth.classList.remove("hidden");
    }

    authToggle.addEventListener("click", () => {
      isSignUp = !isSignUp;
      authTitle.textContent = isSignUp ? "Create account" : "Sign in";
      authSub.textContent = isSignUp
        ? "Sign up with email to join the league."
        : "Predict every match. Climb the leaderboard.";
      authSubmit.textContent = isSignUp ? "Sign up" : "Sign in";
      authToggle.textContent = isSignUp ? "Already have an account? Sign in" : "Create an account";
      nameField.classList.toggle("hidden", !isSignUp);
      document.getElementById("display-name").required = isSignUp;
      authMsg.textContent = isSignUp ? "Fill in the form and tap Sign up." : "";
      authMsg.className = "auth-msg";
    });

    async function handleAuthSubmit(e) {
      e.preventDefault();

      if (!sb) {
        setAuthError("App not ready — refresh the page or use a local server.");
        return;
      }

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const displayName = document.getElementById("display-name").value;

      if (!email || !password) {
        setAuthError("Enter email and password.");
        return;
      }

      if (isSignUp && !trim(displayName)) {
        setAuthError("Enter a display name for the leaderboard.");
        return;
      }

      authSubmit.disabled = true;
      setAuthLoading(isSignUp ? "Creating your account…" : "Signing in…");

      try {
        if (isSignUp) {
          const { data, error } = await sb.auth.signUp({
            email,
            password,
            options: {
              data: { display_name: trim(displayName) },
            },
          });
          if (error) throw error;

          if (data.user) {
            try {
              await ensureProfile(data.user, displayName);
            } catch (profileErr) {
              console.warn("Profile setup:", profileErr);
              setAuthOk(
                "Account created! Profile setup failed — run supabase_setup.sql, then sign in again."
              );
              if (!data.session) return;
            }
          }

          if (data.session?.user) {
            setAuthOk("Welcome! Loading matches…");
            showApp(data.session.user);
          } else {
            setAuthOk("Account created! Check your email to confirm, then sign in.");
          }
        } else {
          const { data, error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          if (!data.user) throw new Error("Sign in failed — no user returned.");
          setAuthOk("Signed in! Loading matches…");
          showApp(data.user);
        }
      } catch (err) {
        console.error("Auth error:", err);
        setAuthError(err.message || "Something went wrong. Try again.");
      } finally {
        authSubmit.disabled = false;
      }
    }

    authForm.addEventListener("submit", handleAuthSubmit);

    document.getElementById("btn-signout").addEventListener("click", async () => {
      if (sb) await sb.auth.signOut();
      showAuth();
    });

    document.querySelectorAll(".nav-item").forEach((btn) => {
      btn.addEventListener("click", () => {
        const page = btn.dataset.page;
        document.querySelectorAll(".nav-item").forEach((b) => {
          b.classList.toggle("active", b.dataset.page === page);
          b.setAttribute("aria-current", b.dataset.page === page ? "page" : null);
        });
        document.getElementById("page-matches").classList.toggle("hidden", page !== "matches");
        document.getElementById("page-leaderboard").classList.toggle("hidden", page !== "leaderboard");
        if (page === "leaderboard") renderLeaderboard();
      });
    });

    async function savePrediction(matchId, pick) {
      const { error } = await sb.from("predictions").upsert(
        { user_id: currentUser.id, match_id: matchId, pick },
        { onConflict: "user_id,match_id" }
      );
      if (error) throw error;
      myPredictions.set(matchId, pick);
      showToast(`Saved: ${pickLabel(pick)}`);
      renderMatches();
      if (!document.getElementById("page-leaderboard").classList.contains("hidden")) {
        renderLeaderboard();
      }
    }

    function renderMatches() {
      const matches = allMatches.filter(isWorldCup).sort((a, b) => {
        const da = a.match_date ? new Date(a.match_date).getTime() : Infinity;
        const db = b.match_date ? new Date(b.match_date).getTime() : Infinity;
        return da - db;
      });

      matchesBanner.classList.add("hidden");
      matchList.innerHTML = "";

      if (matches.length === 0) {
        matchList.innerHTML =
          '<li class="empty">No World Cup matches found. Run: python3 seed_world_cup.py</li>';
        return;
      }

      for (const match of matches) {
        const locked = isLocked(match);
        const savedPick = myPredictions.get(match.id);
        const pendingPick = pendingPicks.get(match.id) ?? savedPick ?? null;
        const st = normalizeStatus(match.status);
        const scored =
          match.home_score != null && match.away_score != null;
        const homeFlag = flagFor(match.home_team);
        const awayFlag = flagFor(match.away_team);
        const homeShort = shortTeam(match.home_team);
        const awayShort = shortTeam(match.away_team);

        const li = document.createElement("li");
        li.className = `match-card${locked ? " locked" : ""}`;

        li.innerHTML = `
          <div class="match-head">
            <span class="match-meta">${formatKickoff(match.match_date)} · ${trim(match.competition)}</span>
            <span class="pill ${locked ? "locked" : st === "live" ? "live" : "open"}">${locked ? "Locked" : st === "live" ? "Live" : "Open"}</span>
          </div>
          <div class="teams-row">
            <div class="team-side">${teamHtml(match.home_team)}</div>
            <div class="score-mid">${scored ? `${match.home_score} – ${match.away_score}` : "vs"}</div>
            <div class="team-side">${teamHtml(match.away_team)}</div>
          </div>
          <div class="prediction-section">
            <div class="prediction-title">Your prediction</div>
            <div class="pick-row">
              <button type="button" class="pick-btn" data-pick="home" ${locked ? "disabled" : ""}>
                Home win<span>${homeFlag} ${homeShort}</span>
              </button>
              <button type="button" class="pick-btn" data-pick="draw" ${locked ? "disabled" : ""}>
                Draw<span>🤝 Tie</span>
              </button>
              <button type="button" class="pick-btn" data-pick="away" ${locked ? "disabled" : ""}>
                Away win<span>${awayFlag} ${awayShort}</span>
              </button>
            </div>
            <button type="button" class="submit-prediction" ${locked ? "disabled" : ""} aria-label="Submit prediction for this match">
              ${locked ? "🔒 Predictions closed" : "✓ Submit Prediction"}
            </button>
            <div class="prediction-status ${locked ? "locked-note" : ""}"></div>
          </div>
        `;

        const statusEl = li.querySelector(".prediction-status");
        const submitBtn = li.querySelector(".submit-prediction");

        if (locked) {
          statusEl.textContent = savedPick
            ? `Locked in: ${pickLabel(savedPick)}`
            : "Kickoff passed — no prediction submitted";
        } else if (savedPick) {
          statusEl.textContent = `Saved: ${pickLabel(savedPick)}`;
        } else {
          statusEl.textContent = "Choose a result, then submit before kickoff";
        }

        const pickButtons = li.querySelectorAll(".pick-btn");
        const syncSubmitState = () => {
          const hasPick = Boolean(pendingPicks.get(match.id));
          if (!locked) {
            submitBtn.classList.toggle("ready", hasPick);
            submitBtn.textContent = hasPick ? "✓ Submit Prediction" : "✓ Submit Prediction";
          }
        };

        pickButtons.forEach((btn) => {
          if (pendingPick === btn.dataset.pick) btn.classList.add("selected");
          btn.addEventListener("click", () => {
            if (locked) return;
            pendingPicks.set(match.id, btn.dataset.pick);
            pickButtons.forEach((b) => b.classList.toggle("selected", b === btn));
            statusEl.textContent = `Selected: ${pickLabel(btn.dataset.pick)} — press Submit Prediction below`;
            statusEl.classList.remove("locked-note");
            syncSubmitState();
          });
        });

        submitBtn.addEventListener("click", async () => {
          if (locked) return;
          const pick = pendingPicks.get(match.id);
          if (!pick) {
            showToast("Select Home win, Draw, or Away win first");
            statusEl.textContent = "Pick a result above, then submit";
            return;
          }
          submitBtn.disabled = true;
          submitBtn.classList.remove("ready");
          submitBtn.textContent = "Saving…";
          try {
            await savePrediction(match.id, pick);
            statusEl.textContent = `Locked in: ${pickLabel(pick)}`;
            submitBtn.textContent = "✓ Submit Prediction";
            showToast("Prediction saved!");
          } catch (err) {
            showToast(err.message || "Could not save prediction");
            statusEl.textContent = "Save failed — try again";
          } finally {
            if (!locked) {
              submitBtn.disabled = false;
              syncSubmitState();
            }
          }
        });

        syncSubmitState();

        matchList.appendChild(li);
      }
    }

    function computeScores() {
      const matchById = Object.fromEntries(allMatches.map((m) => [m.id, m]));
      const profileById = Object.fromEntries(allProfiles.map((p) => [p.id, p]));
      const byUser = {};

      for (const p of allPredictions) {
        if (!byUser[p.user_id]) {
          byUser[p.user_id] = { points: 0, correct: 0, total: 0 };
        }
        const match = matchById[p.match_id];
        if (!match || normalizeStatus(match.status) !== "finished") continue;
        const outcome = getOutcome(match);
        if (!outcome) continue;
        byUser[p.user_id].total += 1;
        if (p.pick === outcome) {
          byUser[p.user_id].correct += 1;
          byUser[p.user_id].points += 1;
        }
      }

      return Object.entries(byUser)
        .map(([userId, stats]) => ({
          userId,
          name: profileById[userId]?.display_name || userId.slice(0, 8) + "…",
          ...stats,
        }))
        .sort((a, b) => b.points - a.points || b.correct - a.correct);
    }

    function renderLeaderboard() {
      const rows = computeScores();
      lbList.innerHTML = "";

      if (rows.length === 0) {
        lbList.innerHTML =
          '<li class="empty">No scored predictions yet. Finish matches to earn points.</li>';
        return;
      }

      rows.forEach((row, i) => {
        const li = document.createElement("li");
        li.className = "lb-row" + (row.userId === currentUser?.id ? " you" : "");
        li.innerHTML = `
          <div class="lb-rank">${i + 1}</div>
          <div class="lb-info">
            <div class="lb-name">${row.name}${row.userId === currentUser?.id ? " (you)" : ""}</div>
            <div class="lb-stats">${row.correct} correct · ${row.total} decided</div>
          </div>
          <div class="lb-points">${row.points}</div>
        `;
        lbList.appendChild(li);
      });
    }

    async function loadAppData() {
      matchesBanner.classList.add("hidden");
      matchList.innerHTML = '<li class="empty">Loading matches…</li>';

      const [matchesRes, predsRes, profilesRes, mineRes] = await Promise.all([
        sb.from("matches").select("*").order("match_date", { ascending: true }),
        sb.from("predictions").select("*"),
        sb.from("profiles").select("*"),
        sb.from("predictions").select("*").eq("user_id", currentUser.id),
      ]);

      if (matchesRes.error) {
        matchList.innerHTML = `<li class="empty">${matchesRes.error.message}</li>`;
        return;
      }

      allMatches = matchesRes.data || [];
      allPredictions = predsRes.data || [];
      allProfiles = profilesRes.data || [];
      myPredictions = new Map((mineRes.data || []).map((p) => [p.match_id, p.pick]));

      renderMatches();
      renderLeaderboard();
    }

    function boot() {
      try {
        if (location.protocol === "file:") {
          showBootError(
            "Opened as a file — auth may not work. Run: python3 -m http.server 8080 then open http://localhost:8080"
          );
        }
        sb = initSupabaseClient();
      } catch (err) {
        console.error(err);
        showBootError(err.message);
        authSubmit.disabled = true;
        return;
      }

      sb.auth.onAuthStateChange((event, session) => {
        if (event === "SIGNED_OUT") {
          showAuth();
          return;
        }
        if (session?.user && (event === "SIGNED_IN" || event === "INITIAL_SESSION")) {
          showApp(session.user);
        }
      });

      sb.auth.getSession().then(({ data, error }) => {
        if (error) {
          setAuthError(error.message);
          return;
        }
        if (data.session?.user) showApp(data.session.user);
        else showAuth();
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }
  </script>
</body>
</html>
